{% extends 'base.html' %}
{% block title %}Вкусы — SportFuel{% endblock %}
{% block content %}
<h1 class="page-title">Вкусы</h1>
<div class="content-card">
    <a href="{% url 'flavor_create' %}" class="btn">+ Добавить вкус</a>
    <table class="crud-table">
        <thead>
            <tr>
                <th>Название</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for flavor in flavors %}
            <tr>
                <td>{{ flavor.name }}</td>
                <td>
                    <a href="{% url 'flavor_detail' flavor.pk %}" class="btn btn-info"></a>
                    <a href="{% url 'flavor_update' flavor.pk %}" class="btn btn-warning"></a>
                    <a href="{% url 'flavor_delete' flavor.pk %}" class="btn btn-danger"></a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="2">Вкусов пока нет</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
